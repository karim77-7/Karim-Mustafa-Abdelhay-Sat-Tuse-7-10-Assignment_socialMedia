<div class="max-w-2xl mx-auto px-1 m-1">
  <div class="flex flex-col gap-4">
    <!-- Create Post -->
    <form class="bg-white rounded-2xl shadow-sm p-6" (submit)="createPost($event)">
      <div class="rounded-2xl shadow-sm p-6 bg-white">
        <div class="flex items-center gap-3 mb-4">
          <img
            src="https://i.pravatar.cc/48?img=12"
            class="w-12 h-12 rounded-full object-cover"
            alt="kimo"
          />
          <div class="flex flex-col gap-1">
            <span class="font-bold text-gray-900 text-base">kimo</span>
  
            <div class="flex items-center gap-2 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium w-fit">
  
              <select class="bg-transparent cursor-pointer border-none outline-none text-gray-600 text-sm font-medium">
                <option>🌐 Public</option>
                <option>👥 Followers</option>
                <option>🔒 Only me</option>
              </select>
            </div>
          </div>
        </div>
  
        <textarea
          
          rows="4"
          placeholder="What's on your mind, kimo?"
          class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-500 placeholder-gray-400 text-sm resize-y focus:outline-none focus:ring-0"
          [formControl]="postDescription"
        ></textarea>
        <hr class="my-4 border-gray-200" />
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-6">
            <label class="flex items-center gap-2 text-gray-500 hover:text-green-500 text-sm font-medium transition-colors cursor-pointer">
              <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 19.5h16.5a1.5 1.5 0 001.5-1.5v-13.5a1.5 1.5 0 00-1.5-1.5H3.75a1.5 1.5 0 00-1.5 1.5v13.5a1.5 1.5 0 001.5 1.5z" />
              </svg>
              Photo/video
              <input (change)="prepareUploadedFile($event)" type="file" accept="image/*,video/*" class="hidden" />
            </label>
            <button class="flex items-center gap-2 text-gray-500 hover:text-yellow-500 text-sm font-medium transition-colors">
              <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 15.182a4.5 4.5 0 01-6.364 0M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75s.168-.75.375-.75.375.336.375.75zm4.875 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75z" />
              </svg>
              Feeling/activity
            </button>
          </div>
          <button class="flex items-center gap-2 bg-blue-400 hover:bg-blue-500 text-white font-semibold px-6 py-2.5 rounded-xl transition-colors text-sm">
            Post
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
            </svg>
          </button>
        </div>
      </div>
    </form>

    <!-- No Posts -->

  </div>
</div>
