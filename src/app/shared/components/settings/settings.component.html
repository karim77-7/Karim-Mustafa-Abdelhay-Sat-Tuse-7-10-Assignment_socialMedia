<div class="min-h-screen bg-gray-100 ">
    <div class="flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-sm p-8 w-full max-w-2xl mt-6">
      
          <!-- Header -->
          <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
              <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
              </svg>
            </div>
            <div>
              <h2 class="text-2xl font-bold text-gray-900">Change Password</h2>
              <p class="text-sm text-gray-500">Keep your account secure by using a strong password.</p>
            </div>
          </div>
      
          <!-- Form -->
          <form [formGroup]="changePasswordForm" (ngSubmit)="changePassword()">
      
            <!-- Current Password -->
            <div class="mb-4">
              <label class="block mb-2 text-sm font-semibold text-gray-800">Current password</label>
              <input
                type="password"
                formControlName="password"
                placeholder="Enter current password"
                class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-400 focus:border-blue-400 block w-full p-3"
              />
            </div>
      
            <!-- New Password -->
            <div class="mb-2">
              <label class="block mb-2 text-sm font-semibold text-gray-800">New password</label>
              <input
                type="password"
                formControlName="newPassword"
                placeholder="Enter new password"
                class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-400 focus:border-blue-400 block w-full p-3"
              />
              <p class="mt-1 text-xs text-gray-400">At least 8 characters with uppercase, lowercase, number, and special character.</p>
            </div>
            
            <!-- Submit -->
            <button
              type="submit"
              class="w-full text-white bg-blue-400 hover:bg-blue-500 focus:ring-4 focus:ring-blue-300 font-semibold rounded-lg text-sm px-5 py-3.5 transition-colors">
              Update password
            </button>
      
          </form>
      
        </div>
      </div>
</div>
