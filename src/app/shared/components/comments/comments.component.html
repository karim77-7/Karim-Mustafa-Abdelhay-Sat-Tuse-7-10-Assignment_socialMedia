@for (comment of commentsList; track comment._id) {
  <section class="p-2 mt-3 rounded-lg border border-gray-100 bg-gray-50">
    
    <div class="flex justify-between">
      <div class="flex items-center gap-x-2">
        <img class="size-10 rounded-full" [src]="comment.commentCreator.photo" alt="" />
        <h2 class="text-gray-800 font-body">{{comment.commentCreator.name}}</h2>
        <p class="text-gray-700">{{comment.createdAt}}</p>
      </div>

      <div class="relative">
        <button
          (click)="menu.hidden = !menu.hidden"
          class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100 transition-colors">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
          </svg>
        </button>

        <div #menu hidden class="absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-lg border border-gray-100 z-50 py-1">

          <button (click)="openEditComment(comment); menu.hidden = true" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
            </svg>
            Edit
          </button>

          <hr class="my-1 border-gray-100"/>

          <button (click)="deleteComment(comment._id)" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-gray-50 font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
            </svg>
            Delete
          </button>

        </div>
      </div>
    </div>

    @if (editingCommentId === comment._id) {
      <textarea class="w-full border rounded-lg p-2 mt-2" [(ngModel)]="commentContent"></textarea>
      <div class="flex gap-2 mt-2">
        <button class="bg-blue-500 text-white px-3 py-1 rounded" (click)="updateComment(comment._id)">Save</button>
        <button class="bg-gray-300 px-3 py-1 rounded" (click)="editingCommentId = null">Cancel</button>
      </div>
    } @else {
      <p class="my-2 text-gray-600">{{comment.content}}</p>
    }

  </section>
}
