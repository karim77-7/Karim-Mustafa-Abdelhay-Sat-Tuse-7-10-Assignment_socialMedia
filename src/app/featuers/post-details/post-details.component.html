@if (post) {

<div class="bg-white rounded-2xl shadow-sm overflow-hidden max-w-2xl mx-auto">
  
    <!-- Header -->
    <div class="flex items-center justify-between px-4 pt-4 pb-3">
      <div class="flex items-center gap-3">
        <img
          [src]="post.user.photo"
          class="w-11 h-11 rounded-full object-cover"
          alt="Ahmed Bahnasy"
        />
        <div class="flex flex-col">
          <span class="font-bold text-gray-900 text-sm"> {{post.user.name}} </span>
          <div class="flex items-center gap-1 text-gray-400 text-xs">
            <span> {{post.user.username}} </span>
            <span>·</span>
            <span>{{post.createdAt}}</span>
            <span>·</span>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m-9 9h18" />
            </svg>
            <span> {{post.privacy}} </span>
          </div>
        </div>
      </div>
      <button class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
        </svg>
      </button>
    </div>
  
    <!-- Content -->
    <div class="px-4 pb-3 text-sm text-gray-800">
      {{post.body}}
    </div>
  
    <!-- Image -->

    @if (post.image) {
      <img
      [src]="post.image"
      class="w-full object-cover max-h-96"
      alt="post image"
    />
    }
    @else {
      <img src="/images/image.png" alt="">
    }
  
    <!-- Stats -->
    <div class="flex items-center justify-between px-4 py-2 text-gray-400 text-xs border-b border-gray-100">
      <div class="flex items-center gap-1">
        <div class="w-5 h-5 bg-blue-500 rounded-full flex items-center justify-center">
          <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/>
          </svg>
        </div>
        <span>4 likes</span>
      </div>
      <div class="flex items-center gap-3">
        <button class="hover:underline hover:text-gray-600 transition-colors">0 shares</button>
        <button class="hover:underline hover:text-gray-600 transition-colors">0 comments</button>
        <div class="cursor-pointer" >
          <button class="text-blue-500 font-semibold hover:underline">View details</button>
        </div>
      </div>
    </div>
  
    <!-- Actions -->
    <div class="flex items-center divide-x divide-gray-100">
      <button class="flex-1 flex items-center justify-center gap-2 py-3 text-gray-500 hover:bg-gray-50 text-sm font-medium transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.633 10.5c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 012.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 00.322-1.672V3a.75.75 0 01.75-.75A2.25 2.25 0 0116.5 4.5c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 01-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 00-1.423-.23H5.904M14.25 9h2.25M5.904 18.75c.083.205.173.405.27.602.197.4-.078.898-.523.898h-.908c-.889 0-1.713-.518-1.972-1.368a12 12 0 01-.521-3.507c0-1.553.295-3.036.831-4.398C3.387 10.203 4.167 9.75 5 9.75h1.053c.472 0 .745.556.5.96a8.958 8.958 0 00-1.302 4.665c0 1.194.232 2.333.654 3.375z" />
        </svg>
        Like
      </button>
      <button #showCommentsBtn class="flex-1 flex items-center justify-center gap-2 py-3 text-gray-500 hover:bg-gray-50 text-sm font-medium transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z" />
        </svg>
        Comment
      </button>
      <button class="flex-1 flex items-center justify-center gap-2 py-3 text-gray-500 hover:bg-gray-50 text-sm font-medium transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
        </svg>
        Share
      </button>
    </div>

    <div class="max-h-100 overflow-y-scroll">
      @defer(on interaction(showCommentsBtn)) {

        <app-comments [postId]="post._id" ></app-comments>
       }
    </div>

    <div>

      <form (submit)="createComment($event, post._id)" class="px-4 py-3">
        <div class="flex items-center px-3 py-2 rounded-lg bg-gray-50 border border-gray-200">
          <label class="p-2 text-gray-400 rounded-sm cursor-pointer hover:text-gray-600 hover:bg-gray-200">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path fill="currentColor" d="M16 18H8l2.5-6 2 4 1.5-2 2 4Zm-1-8.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/>
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 3v4a1 1 0 0 1-1 1H5m14-4v16a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7.914a1 1 0 0 1 .293-.707l3.914-3.914A1 1 0 0 1 9.914 3H18a1 1 0 0 1 1 1ZM8 18h8l-2-4-1.5 2-2-4L8 18Zm7-8.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/>
            </svg>
            <input type="file" accept="image/*" class="hidden" (change)="prepareUploadedFile($event)" />
          </label>
          <textarea rows="1" class="mx-4 bg-white border border-gray-200 text-gray-800 text-sm rounded-lg focus:ring-blue-400 focus:border-blue-400 block w-full px-3 py-2.5 placeholder:text-gray-400 resize-none" placeholder="Write a comment..." [formControl]="commentDescription" ></textarea>
          <button type="submit" class="inline-flex justify-center p-2 text-blue-400 rounded-full cursor-pointer hover:bg-blue-50">
            <svg class="w-6 h-6 rotate-90" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m12 18-7 3 7-18 7 18-7-3Zm0 0v-5"/>
            </svg>
          </button>
        </div>
      </form>

    </div>


  
  </div>    
}
